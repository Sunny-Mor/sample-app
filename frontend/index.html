<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Application</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        h2 { color: #333; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        input, textarea { padding: 8px; margin: 5px; width: 300px; }
        .result { margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Sample Application Dashboard</h1>
    
    <div class="section">
        <h2>Users (DynamoDB)</h2>
        <button onclick="getUsers()">Get Users</button>
        <div>
            <input type="text" id="userId" placeholder="User ID">
            <input type="text" id="userName" placeholder="Name">
            <input type="text" id="userEmail" placeholder="Email">
            <button onclick="createUser()">Create User</button>
        </div>
        <div id="usersResult" class="result"></div>
    </div>
    
    <div class="section">
        <h2>Orders (PostgreSQL)</h2>
        <button onclick="getOrders()">Get Orders</button>
        <div>
            <input type="text" id="orderUserId" placeholder="User ID">
            <input type="text" id="orderProduct" placeholder="Product">
            <input type="number" id="orderAmount" placeholder="Amount">
            <button onclick="createOrder()">Create Order</button>
        </div>
        <div id="ordersResult" class="result"></div>
    </div>
    
    <div class="section">
        <h2>File Upload (S3)</h2>
        <input type="file" id="fileInput">
        <button onclick="uploadFile()">Upload File</button>
        <div id="uploadResult" class="result"></div>
    </div>
    
    <div class="section">
        <h2>Send Email (SES)</h2>
        <input type="email" id="emailTo" placeholder="To Email">
        <input type="text" id="emailSubject" placeholder="Subject">
        <textarea id="emailBody" placeholder="Email Body"></textarea>
        <button onclick="sendEmail()">Send Email</button>
        <div id="emailResult" class="result"></div>
    </div>

    <script>
        const API_URL = '/api';

        async function getUsers() {
            try {
                const response = await fetch(`${API_URL}/users`);
                const data = await response.json();
                document.getElementById('usersResult').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                document.getElementById('usersResult').innerHTML = `<pre>Error: ${error.message}</pre>`;
            }
        }

        async function createUser() {
            try {
                const user = {
                    user_id: document.getElementById('userId').value,
                    name: document.getElementById('userName').value,
                    email: document.getElementById('userEmail').value
                };
                const response = await fetch(`${API_URL}/users`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(user)
                });
                const data = await response.json();
                document.getElementById('usersResult').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                document.getElementById('usersResult').innerHTML = `<pre>Error: ${error.message}</pre>`;
            }
        }

        async function getOrders() {
            try {
                const response = await fetch(`${API_URL}/orders`);
                const data = await response.json();
                document.getElementById('ordersResult').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                document.getElementById('ordersResult').innerHTML = `<pre>Error: ${error.message}</pre>`;
            }
        }

        async function createOrder() {
            try {
                const order = {
                    user_id: document.getElementById('orderUserId').value,
                    product: document.getElementById('orderProduct').value,
                    amount: parseFloat(document.getElementById('orderAmount').value)
                };
                const response = await fetch(`${API_URL}/orders`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(order)
                });
                const data = await response.json();
                document.getElementById('ordersResult').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                document.getElementById('ordersResult').innerHTML = `<pre>Error: ${error.message}</pre>`;
            }
        }

        async function uploadFile() {
            try {
                const fileInput = document.getElementById('fileInput');
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                
                const response = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                document.getElementById('uploadResult').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                document.getElementById('uploadResult').innerHTML = `<pre>Error: ${error.message}</pre>`;
            }
        }

        async function sendEmail() {
            try {
                const email = {
                    to: document.getElementById('emailTo').value,
                    subject: document.getElementById('emailSubject').value,
                    body: document.getElementById('emailBody').value
                };
                const response = await fetch(`${API_URL}/send-email`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(email)
                });
                const data = await response.json();
                document.getElementById('emailResult').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                document.getElementById('emailResult').innerHTML = `<pre>Error: ${error.message}</pre>`;
            }
        }
    </script>
</body>
</html>
